<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzería Deliciosa</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

    <!-- Header -->
    <header>
        <img src="assets/img/pngwing.com.png" alt="Logo Pizzería">
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="menu.html">Menú</a></li>
                <li><a href="contact.html">Contacto</a></li>
                <li><a href="about.html">Sobre Nosotros</a></li>
            </ul>
        </nav>
        <input type="text" placeholder="Buscar pizza..." id="search">
    </header>

    <!-- Carrusel 1 -->
    <section class="carousel">
        <h2>🍕 Oferta Especial</h2>
        <div id="carousel1" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="assets/img/e9e1e82cb873-pepperoni-pizza-abob-t.webp" class="d-block w-100" alt="Promo 1">
                </div>
                <div class="carousel-item">
                    <img src="assets/img/e9e1e82cb873-pepperoni-pizza-abob-t.webp" class="d-block w-100" alt="Promo 2">
                </div>
                <div class="carousel-item">
                    <img src="assets/img/e9e1e82cb873-pepperoni-pizza-abob-t.webp" class="d-block w-100" alt="Promo 3">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carousel1" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carousel1" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </section>

    <!-- Carrusel 2 -->
    <section class="carousel">
        <h2>🔥 Pizza Más Popular</h2>
        <div id="carousel2" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="assets/img/pizza-jamon-y-queso-Newlux.jpg" class="d-block w-100" alt="Popular 1">
                </div>
                <div class="carousel-item">
                    <img src="assets/img/pizza-jamon-y-queso-Newlux.jpg" class="d-block w-100" alt="Popular 2">
                </div>
                 <div class="carousel-item">
                    <img src="assets/img/pizza-jamon-y-queso-Newlux.jpg" class="d-block w-100" alt="Popular 3">
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#carousel2" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carousel2" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </section>


        <!-- Carrusel 3 -->
    <section class="carousel">
        <h2>🔥 Pizza Especial</h2>
        <div id="carousel3" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="assets/img/tejana-bbq-scaled.jpg" class="d-block w-100" alt="Especial 1">
                </div>
                <div class="carousel-item">
                    <img src="assets/img/tejana-bbq-scaled.jpg" class="d-block w-100" alt="Especial 2">
                </div>
                     <div class="carousel-item">
                    <img src="assets/img/tejana-bbq-scaled.jpg" class="d-block w-100" alt="Especial 3">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carousel3" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carousel3" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Pizzería Deliciosa - Todos los derechos reservados</p>
